<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🚕 طلب مشوار</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg: linear-gradient(135deg, #0f172a, #1e293b);
  --card: rgba(255,255,255,0.08);
  --text: #ffffff;
  --hint: #cbd5e1;
  --primary: #22c55e;
  --danger: #ef4444;
}

body {
  margin: 0;
  font-family: Tahoma;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 20px;
}

h1 {
  margin: 0 0 10px;
}

.sub {
  color: var(--hint);
  margin-bottom: 15px;
}

label {
  margin-top: 12px;
  display: block;
}

input, textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
}

button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: bold;
}

.status {
  margin-top: 10px;
}

.ok { color: #22c55e; }
.err { color: #ef4444; }

.loc-box {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🚕 طلب مشوار</h1>
<div class="sub">اطلب سائق بسهولة خلال ثواني</div>

<label>📍 نقطة الانطلاق</label>
<input id="pickup_text" placeholder="حدد موقعك أو اكتبه" />

<button id="locBtn">📍 تحديد موقعي</button>
<div id="locInfo" class="loc-box">لم يتم تحديد الموقع</div>

<label>🎯 الوجهة</label>
<input id="destination" placeholder="إلى أين؟" />

<label>👥 عدد الركاب</label>
<select id="passengers">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<label>📝 ملاحظات</label>
<textarea id="notes"></textarea>

<div id="status" class="status"></div>

</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let lat=null, lon=null;
let sending=false;

const statusEl = document.getElementById("status");

function setStatus(t, type=""){
  statusEl.className = "status " + type;
  statusEl.textContent = t;
}

document.getElementById("locBtn").onclick = () => {
  navigator.geolocation.getCurrentPosition(pos=>{
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
    document.getElementById("locInfo").textContent = "📍 تم تحديد الموقع";
    setStatus("تم تحديد الموقع", "ok");
  },()=>{
    setStatus("فشل تحديد الموقع", "err");
  });
};

tg.MainButton.setText("🚀 إرسال الطلب");
tg.MainButton.show();

tg.MainButton.onClick(()=>{
  if(sending) return;
  sending = true;

  const dest = document.getElementById("destination").value;

  if(!lat){
    setStatus("حدد موقعك أولاً","err");
    sending=false;
    return;
  }

  if(!dest){
    setStatus("اكتب الوجهة","err");
    sending=false;
    return;
  }

  tg.MainButton.setText("جاري الإرسال...");
  tg.MainButton.disable();

  const data = {
    action:"create_trip",
    pickup_lat:lat,
    pickup_lon:lon,
    destination:dest,
    passengers:document.getElementById("passengers").value,
    notes:document.getElementById("notes").value
  };

  tg.sendData(JSON.stringify(data));
  tg.close();
});
</script>

</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚕 طلب مشوار</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255,255,255,0.10);
      --text: #ffffff;
      --hint: #cbd5e1;
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 18px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin: 10px 0 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero p {
      margin: 0;
      color: var(--hint);
      line-height: 1.8;
      font-size: 15px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 700;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      background: rgba(255,255,255,0.96);
      color: #111827;
      outline: none;
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      margin-top: 12px;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .loc-box {
      margin-top: 10px;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.10);
      color: var(--hint);
      line-height: 1.8;
      font-size: 14px;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.8;
    }

    .ok { color: #86efac; }
    .err { color: #fca5a5; }

    .footer-note {
      margin-top: 14px;
      color: var(--hint);
      font-size: 13px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🚕 طلب مشوار</h1>
      <p>أدخل بيانات الرحلة وسنرسل طلبك مباشرة إلى السائقين المتاحين.</p>
    </div>

    <div class="card">
      <label for="pickup_text">📍 نقطة الانطلاق</label>
      <input id="pickup_text" placeholder="حدد موقعك أو اكتب المكان يدويًا" />

      <button id="locBtn" class="btn" type="button">📍 تحديد موقعي الحالي</button>
      <div id="locInfo" class="loc-box">لم يتم تحديد الموقع بعد.</div>

      <label for="destination">🎯 الوجهة</label>
      <input id="destination" placeholder="إلى أين تريد الذهاب؟" />

      <div class="row">
        <div>
          <label for="passengers">👥 عدد الركاب</label>
          <select id="passengers">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>

        <div>
          <label for="city">🏙️ المدينة</label>
          <input id="city" value="الطائف" />
        </div>
      </div>

      <label for="notes">📝 ملاحظات</label>
      <textarea id="notes" placeholder="مثال: عندي شنط / أمام البوابة"></textarea>

      <div id="status" class="status"></div>

      <div class="footer-note">
        سيتم استخدام موقعك الحالي لالتقاط نقطة الانطلاق بدقة.
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.MainButton.setText("🚀 إرسال الطلب");
      tg.MainButton.show();
      tg.MainButton.enable();
    }

    let lat = null;
    let lon = null;
    let sending = false;

    const pickupInput = document.getElementById("pickup_text");
    const destinationInput = document.getElementById("destination");
    const passengersInput = document.getElementById("passengers");
    const notesInput = document.getElementById("notes");
    const cityInput = document.getElementById("city");
    const locBtn = document.getElementById("locBtn");
    const locInfo = document.getElementById("locInfo");
    const statusEl = document.getElementById("status");

    function setStatus(text, type = "") {
      statusEl.className = "status " + type;
      statusEl.textContent = text;
    }

    async function reverseGeocode(lat, lon) {
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&accept-language=ar&zoom=18&addressdetails=1&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`;

      const res = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!res.ok) {
        throw new Error("تعذر جلب وصف الموقع");
      }

      const data = await res.json();
      const addr = data.address || {};

      const suburb =
        addr.suburb ||
        addr.neighbourhood ||
        addr.quarter ||
        addr.city_district ||
        "";

      const road =
        addr.road ||
        addr.pedestrian ||
        addr.residential ||
        "";

      const city =
        addr.city ||
        addr.town ||
        addr.village ||
        cityInput.value.trim() ||
        "الطائف";

      const parts = [suburb, road, city].filter(Boolean);

      if (parts.length) {
        return parts.join("، ");
      }

      return data.display_name || "موقع مرسل";
    }

    locBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        setStatus("هذا الجهاز لا يدعم تحديد الموقع.", "err");
        return;
      }

      setStatus("جاري تحديد الموقع...", "");
      locBtn.disabled = true;
      locBtn.textContent = "⏳ جاري التحديد...";

      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          lat = Number(pos.coords.latitude.toFixed(6));
          lon = Number(pos.coords.longitude.toFixed(6));

          locInfo.textContent = `تم الحصول على الإحداثيات، جاري جلب وصف الموقع...`;

          try {
            const niceAddress = await reverseGeocode(lat, lon);
            pickupInput.value = `📍 ${niceAddress}`;
            locInfo.textContent = `تم تحديد موقعك: ${niceAddress}`;
            setStatus("تم تحديد الموقع بنجاح.", "ok");
          } catch (e) {
            const fallback = cityInput.value.trim() || "الطائف";
            pickupInput.value = `📍 ${fallback}`;
            locInfo.textContent = "تم تحديد الإحداثيات، لكن تعذر جلب وصف الموقع النصي.";
            setStatus("تم تحديد الموقع، لكن تعذر جلب الوصف التفصيلي.", "ok");
          } finally {
            locBtn.disabled = false;
            locBtn.textContent = "📍 تحديد موقعي الحالي";
          }
        },
        (err) => {
          const message = err && err.message ? err.message : "تعذر تحديد الموقع";
          setStatus("فشل تحديد الموقع: " + message, "err");
          locBtn.disabled = false;
          locBtn.textContent = "📍 تحديد موقعي الحالي";
        },
        {
          enableHighAccuracy: true,
          timeout: 12000,
          maximumAge: 0
        }
      );
    });

    function submitTrip() {
      if (sending) return;
      sending = true;

      const destination = destinationInput.value.trim();
      const pickupText = pickupInput.value.trim();
      const notes = notesInput.value.trim();
      const passengers = parseInt(passengersInput.value || "1", 10);
      const city = cityInput.value.trim() || "الطائف";

      if (!lat || !lon) {
        setStatus("حدد موقع الانطلاق أولًا.", "err");
        sending = false;
        return;
      }

      if (!destination) {
        setStatus("اكتب الوجهة أولًا.", "err");
        sending = false;
        return;
      }

      const payload = {
        action: "create_trip",
        pickup_text: pickupText || `📍 ${city}`,
        pickup_lat: lat,
        pickup_lon: lon,
        destination,
        passengers,
        notes,
        city
      };

      try {
        if (tg) {
          tg.MainButton.setText("جاري الإرسال...");
          tg.MainButton.disable();
          tg.sendData(JSON.stringify(payload));
          tg.close();
        } else {
          setStatus("الصفحة تعمل خارج تيليجرام، لذلك لن يتم إرسال الطلب.", "err");
          console.log(payload);
          sending = false;
        }
      } catch (e) {
        setStatus("تعذر إرسال الطلب إلى البوت.", "err");
        sending = false;
        if (tg) {
          tg.MainButton.setText("🚀 إرسال الطلب");
          tg.MainButton.enable();
        }
      }
    }

    if (tg) {
      tg.MainButton.onClick(submitTrip);
    }
  </script>
</body>
</html>
